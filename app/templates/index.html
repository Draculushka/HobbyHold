<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HobbyHaven</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="max-w-4xl mx-auto p-6">
<h1 class="text-4xl font-bold mb-6">HobbyHaven</h1>

<div class="bg-white p-6 rounded-xl shadow mb-10">
<h2 class="text-2xl font-semibold mb-4">Add Hobby</h2>
<form action="/create-post" method="post" enctype="multipart/form-data" class="space-y-4">
<input class="w-full border rounded p-2" type="text" name="title" placeholder="Hobby title" required>
<textarea class="w-full border rounded p-2" name="description" placeholder="Description"></textarea>
<input class="w-full" type="file" name="image">
<button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" type="submit">Post</button>
</form>
</div>

<h2 class="text-2xl font-semibold mb-4">Posts</h2>
<div class="space-y-6">
{% for post in posts %}
<div class="bg-white rounded-xl shadow overflow-hidden border border-gray-200 flex {% if loop.index is even %}flex-row-reverse{% else %}flex-row{% endif %}">

  {% if post.image_path %}
  <img src="/uploads/{{ post.image_path }}" class="w-1/2 object-cover">
  {% else %}
  <div class="w-1/2 bg-gray-200"></div>
  {% endif %}

  <div class="w-1/2 p-6 flex flex-col justify-between">
    <div>
      <h3 class="text-xl font-semibold">{{ post.title }}</h3>
      <p class="text-gray-600 mt-2">{{ post.description }}</p>
    </div>
    <div class="flex gap-2 justify-end mt-4">
      <a href="/edit/{{ post.id }}" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">Edit</a>
      <form action="/delete-post/{{ post.id }}" method="post">
        <button class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Delete</button>
      </form>
    </div>
  </div>

</div>
{% endfor %}
</div>

</div>
</body>
</html>
