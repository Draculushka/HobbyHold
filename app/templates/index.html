<!DOCTYPE html>
<html>
<head>
<title>HobbyHaven</title>
</head>

<body>

<h1>My Hobbies</h1>

{% for post in posts %}

<div style="border:1px solid gray;padding:15px;margin:15px;">

<h2>{{ post.title }}</h2>

<p>{{ post.description }}</p>

{% if post.image_path %}
<img src="/uploads/{{ post.image_path }}" width="300">
{% endif %}

</div>

{% endfor %}

</body>
</html>
