[tool.ruff]
line-length = 120
select = ["E", "F", "I", "B", "S"]
ignore = [
    "E501", # Длинные строки
    "E402", # Импорты не в начале (нужно для моделей)
    "B008", # Depends() в аргументах (стандарт FastAPI)
    "S704", # Markup (мы сами санитизируем через nh3)
    "B904", # raise from (упрощаем обработку ошибок)
    "S105", # token_type = "bearer" (ложное срабатывание на пароль)
    "S603"  # subprocess.run (нужен для FFmpeg)
]
exclude = [
    "migrations/",
    "seed_hobbies.py",
    "venv/",
    ".git/",
    "__pycache__/"
]

[tool.ruff.lint.isort]
known-first-party = ["api", "core", "models", "schemas", "services"]

[tool.ruff.lint.per-file-ignores]
# Разрешаем ассерты и "пароли" в тестах
"tests/*" = ["S101", "S105", "S106", "S107"]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
exclude = ["migrations/", "venv/", "data/"]
