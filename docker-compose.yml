version: "3.8"

services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    container_name: hobby_db
    environment:
      - POSTGRES_USER=draculushka
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=hobbyheaven
    volumes:
      # Теперь данные БД хранятся прямо в папке проекта
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - hobby_network
    restart: always

  # FastAPI приложение
  web:
    build: .
    container_name: hobby_web
    environment:
      - DATABASE_URL=postgresql://draculushka:secure_password@db/hobbyheaven
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    volumes:
      # Прокидываем папку с кодом для мгновенного обновления
      - ./app:/app/app
      # Картинки тоже выносим в общую папку данных
      - ./data/uploads:/app/app/uploads
    networks:
      - hobby_network
    restart: always

  # Веб-сервер Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: hobby_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - hobby_network
    restart: always

networks:
  hobby_network:
    driver: bridge
